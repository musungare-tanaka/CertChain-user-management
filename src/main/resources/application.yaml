# ── Server ────────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8081}

# ── Datasource (H2 — swap for PostgreSQL/MySQL in production) ─────────────────
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  # ── JPA ─────────────────────────────────────────────────────────────────────
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  # ── H2 Console (disable in production) ──────────────────────────────────────
  h2:
    console:
      enabled: true
      path: /h2-console
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:musungaretanaka@gmail.com}
    password: ${MAIL_PASSWORD:llyn hhhf sfci jkgo}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:true}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

# ── JWT ───────────────────────────────────────────────────────────────────────
app:
  jwt:
    # Base64-encoded secret. Replace in production.
    secret: ${JWT_SECRET_BASE64:bXN1LWNlcnQtZGV2LWp3dC1zZWNyZXQta2V5LTMyaC1wbHVzLWNoYW5nZS1tZQ==}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  verification-base-url: ${VERIFICATION_BASE_URL:http://localhost:3000/verify}
  share-base-url: ${SHARE_BASE_URL:http://localhost:3000/verify/share}
  local-storage:
    path: ${LOCAL_STORAGE_PATH:/tmp/msu-cert-storage}
  certificate-signing:
    # Optional PEM-derived PKCS8/X509 keys in Base64. If blank, ephemeral keys are generated in dev mode.
    private-key-base64: ${CERT_SIGN_PRIVATE_KEY_BASE64:}
    public-key-base64: ${CERT_SIGN_PUBLIC_KEY_BASE64:}
  admin:
    bootstrap-enabled: ${ADMIN_BOOTSTRAP_ENABLED:true}
    email: ${ADMIN_EMAIL:admin@msu.local}
    password: ${ADMIN_PASSWORD:Admin@12345}
    full-name: ${ADMIN_FULL_NAME:System Administrator}
  notifications:
    email-enabled: ${EMAIL_NOTIFICATIONS_ENABLED:false}
    from: ${EMAIL_NOTIFICATIONS_FROM:musungaretanaka@gmail.com}
    fail-on-error: ${EMAIL_NOTIFICATIONS_FAIL_ON_ERROR:false}

